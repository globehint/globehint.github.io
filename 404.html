<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta property="og:site_name"   content="Globehint">
<meta property="og:title"       content="Page Not Found - Globehint">
<meta property="og:description" content="This page doesn't exist, but your next trip destination does.">
<meta property="og:image"       content="https://globehint.github.io/images/og/globehint-og.jpg">
<meta property="og:image:width"  content="1200">
<meta property="og:image:height" content="630">

<link rel="preload" as="font" type="font/woff2" crossorigin href="/fonts/fraunces-v38-latin-500.woff2">
<link rel="stylesheet" href="/site.css">
<link rel="preload" as="style" href="/nav-footer.css">
<link rel="stylesheet" href="/nav-footer.css">
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js" integrity="sha256-42IbU8t3tOwwbexB7ZVRHm3YDRf65aBPPjRtIUufj5I=" crossorigin="anonymous" defer></script>
<meta name="theme-color" content="#F3EADD" media="(prefers-color-scheme: light)">

 <link rel="apple-touch-icon" href="/apple-touch-icon.png">

 <link rel="alternate" type="application/rss+xml"
   title="Globehint - New Travel Guides &amp; Pit Stops"
   href="https://globehint.github.io/feed.xml">
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<div id="global-navbar"></div>
<script src="navbar.js" defer></script>
<main id="main">

<div class="not-found">
  <div class="nf-inner">

    <div class="nf-stamp" aria-hidden="true">
      <span class="nf-stamp-number">404</span>
      <span class="nf-stamp-label">Not found</span>
    </div>

    <h1>This page doesn't exist.<br><em>Your next trip does.</em></h1>
    <p class="nf-lede">The link might be broken, or the page may have moved. Search below and you'll find what you're looking for.</p>

    <form class="search-postcard" role="search" aria-label="Search destinations" id="nf-search-form">
      <div class="search-postcard-inner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="11" cy="11" r="7"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="nf-search-input" placeholder="Where are you headed?" aria-label="Destination" autocomplete="off">
        <button type="submit" class="search-btn">Find your guide</button>
      </div>
      <div id="nf-search-results" class="search-results" hidden></div>
    </form>

    <nav class="nf-nav" aria-label="Helpful links">
      <a href="index.html">Home</a>
      <span class="sep">·</span>
      <a href="destinations.html">All Destinations</a>
      <span class="sep">·</span>
      <a href="daytrips.html">Day Trips</a>
    </nav>

  </div>
</div>
</main>

<div id="global-footer"></div>

<script>
  // ===== 404 SEARCH =====
  // Reuses the same guides.json + GLOBEHINT_GUIDES_READY pattern as every
  // other page - no separate data source. The search logic is a straight
  // copy of the homepage's, so behaviour is identical: live results as
  // you type, Enter navigates to the best match.

  const searchForm  = document.getElementById('nf-search-form');
  const searchInput = document.getElementById('nf-search-input');
  const resultsBox  = document.getElementById('nf-search-results');

  let GUIDES = [];

  let fuse = null;
  try {
    fuse = new Fuse([], {
      keys: ['name', 'country', 'continent', 'vibe'],
      threshold: 0.3
    });
  } catch (err) {
    // Fuse.js didn't load (CDN hiccup, ad-blocker, offline, etc). Fall back
    // to plain substring matching below rather than letting this throw and
    // break the rest of this script block.
    console.error('Globehint: Fuse.js unavailable, falling back to basic search.', err);
  }

  function basicSearch(query) {
    const q = normalize(query);
    return GUIDES
      .filter(g => normalize(g.name).includes(q) || normalize(g.country).includes(q))
      .map(item => ({ item }));
  }

  function runSearch(query) {
    return fuse ? fuse.search(query) : basicSearch(query);
  }

  function normalize(str) {
    return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  const escapeHtml = window.GLOBEHINT_escapeHtml;

  function renderResults(query) {
    const q = normalize(query.trim());
    if (!q) { resultsBox.hidden = true; resultsBox.innerHTML = ''; return; }

    const matches = runSearch(q).map(r => r.item);

    if (matches.length === 0) {
      resultsBox.innerHTML = '<div class="sr-empty">No Results Available<a href="index.html#bug-report" style="text-decoration:underline;">Suggest a Destination</a></div>';
      resultsBox.hidden = false;
      return;
    }

    const RESULT_CAP = 8;
    const shown = matches.slice(0, RESULT_CAP);
    const overflowCount = matches.length - shown.length;

    resultsBox.innerHTML = shown.map(g =>
      '<a href="' + escapeHtml(g.url) + '">' +
        '<span class="sr-place">' + escapeHtml(g.name) + '</span>' +
        '<span class="sr-country">' +
          escapeHtml(g.country) + ' ' +
          (g.flag ? '<span class="fi fi-' + g.flag + '" aria-hidden="true"></span>' : '') +
        '</span>' +
      '</a>'
    ).join('') + (overflowCount > 0
      ? '<div class="sr-empty sr-overflow">+ ' + overflowCount + ' more - press enter to jump to the closest match</div>'
      : '');

    resultsBox.hidden = false;
  }

  function goToBestMatch(query) {
    const q = normalize(query.trim());
    if (!q) return;
    const results = runSearch(q);
    const match = results.length > 0 ? results[0].item : null;
    if (match) window.location.href = match.url;
    else renderResults(query);
  }

  if (searchInput) {
    searchInput.addEventListener('input', () => renderResults(searchInput.value));
    searchInput.addEventListener('focus',  () => { if (searchInput.value.trim()) renderResults(searchInput.value); });
  }

  if (searchForm) {
    searchForm.addEventListener('submit', e => { e.preventDefault(); goToBestMatch(searchInput.value); });
  }

  document.addEventListener('click', e => {
    if (searchForm && !searchForm.contains(e.target)) resultsBox.hidden = true;
  });

  document.addEventListener('DOMContentLoaded', () => {
    if (window.GLOBEHINT_GUIDES_READY) {
      window.GLOBEHINT_GUIDES_READY.then(guides => { GUIDES = guides || []; if (fuse) fuse.setCollection(GUIDES); });
    } else {
      console.error('Globehint: navbar.js did not initialise guides.json loading.');
    }
  });
</script>

</body>
</html>
