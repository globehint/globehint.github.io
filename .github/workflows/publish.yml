name: Auto-Process Guides & Generate Images

on:
  push:
    paths:
      - 'drafts/**.html'

permissions:
  contents: write

jobs:
  process-and-compress:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Image Tools
        run: sudo apt-get update && sudo apt-get install -y webp imagemagick

      - name: Install Python Dependencies
        run: pip install requests

      # UPDATED: Pointing to your _automation folder
      - name: 1. Run Python Content Processor
        env:
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python _automation/process_guides.py

      - name: 2. Generate Sized WebP & JPEG Variants
        run: |
          for src in images/guides/*-hero.jpg images/guides/*-hero.png; do
            [ -e "$src" ] || continue
            slug=$(basename "$src" | sed -E 's/-hero\.(jpg|png)$//')
            dir=$(dirname "$src")

            # Generate WebP variants
            for width in 400 800 1200; do
              out="$dir/${slug}-hero-${width}.webp"
              if [ ! -f "$out" ]; then
                cwebp -q 80 -resize "$width" 0 "$src" -o "$out"
              fi
            done

            # Generate compressed 800px fallback JPEG
            jpg_out="$dir/${slug}-hero-800.jpg"
            if [ ! -f "$jpg_out" ]; then
              convert "$src" -resize 800x -quality 78 -strip "$jpg_out"
            fi
          done

      - name: 3. Commit and Push Everything
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add guides.json guides/ drafts/ images/guides/
          git diff --staged --quiet && exit 0
          git commit -m "Automated: Processed guides, linked cards, and generated images [skip ci]"
          git pull --rebase
          git push
