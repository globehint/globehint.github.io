<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - Globehint</title>
<meta name="description" content="About Globehint - a one-person, no-profit travel guide project.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.3.2/css/flag-icons.min.css">
<link rel="stylesheet" href="site.css">
<style>

  /* ===== HERO ===== */
  .hero {
    position: relative;
    padding: 72px 32px 84px;
    text-align: center;
    overflow: hidden;
  }

  .hero-eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ochre);
    font-weight: 500;
    margin-bottom: 18px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  .hero-eyebrow::before, .hero-eyebrow::after {
    content: "";
    width: 28px;
    height: 1px;
    background: var(--ochre);
    opacity: 0.5;
  }

  .hero h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: clamp(2.3rem, 5.2vw, 3.9rem);
    line-height: 1.08;
    letter-spacing: -0.015em;
    max-width: 820px;
    margin: 0 auto 18px;
  }

  .hero h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--forest);
  }

  .hero p.lede {
    font-size: 1.04rem;
    color: var(--ink-soft);
    max-width: 500px;
    margin: 0 auto 32px;
  }

  /* search "postcard" */
  .search-postcard {
    max-width: 480px;
    margin: 0 auto;
    background: var(--paper);
    border: 1.5px solid var(--ink);
    border-radius: 6px;
    padding: 7px;
    position: relative;
    box-shadow: 4px 4px 0 var(--tan);
  }

  .search-postcard-inner {
    display: flex;
    align-items: center;
    gap: 8px;
    background: white;
    border-radius: 4px;
    padding: 5px 5px 5px 14px;
    border: 1px solid var(--tan);
  }

  .search-postcard-inner svg {
    flex-shrink: 0;
    color: var(--fade);
    width: 16px;
    height: 16px;
  }

  .search-postcard-inner input {
    flex: 1;
    border: none;
    outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 0.88rem;
    color: var(--ink);
    background: transparent;
    padding: 8px 0;
    min-width: 0;
  }

  .search-postcard-inner input::placeholder { color: #A89F8E; }

  .search-btn {
    background: var(--ochre);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 4px;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.15s ease;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .search-btn:hover { background: #5C201D; transform: translateY(-1px); }

  /* search results dropdown */
  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 7px;
    right: 7px;
    background: white;
    border: 1px solid var(--tan);
    border-radius: 6px;
    box-shadow: 0 8px 20px rgba(42, 24, 21, 0.12);
    overflow: hidden;
    z-index: 10;
    text-align: left;
  }

  .search-results a {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 10px 14px;
    font-size: 0.88rem;
    color: var(--ink);
    border-bottom: 1px solid var(--paper-deep);
  }

  .search-results a:last-child { border-bottom: none; }

  .search-results a:hover,
  .search-results a:focus-visible {
    background: var(--paper);
  }

  .search-results .sr-place { font-weight: 600; }

  .search-results .sr-country {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--fade);
    text-transform: uppercase;
  }

  .search-results .sr-empty {
    padding: 14px;
    font-size: 0.85rem;
    color: var(--ink-soft);
  }

  .search-tags {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
  }

  .search-tags span {
    color: var(--fade);
    padding: 4px 10px;
    border: 1px solid var(--tan);
    border-radius: 100px;
    cursor: default;
    transition: border-color 0.2s ease, color 0.2s ease;
  }

  .search-tags span:hover {
    border-color: var(--forest);
    color: var(--forest);
  }

  .search-tags span[data-search] {
    cursor: pointer;
    background: none;
    font: inherit;
  }

  /* ===== SECTION HEADERS ===== */
  .section-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
    gap: 24px;
    flex-wrap: wrap;
  }

  .section-head h2 {
    font-family: 'Fraunces', serif;
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .section-head .section-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--fade);
  }

  .section-head .see-all {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    color: var(--forest);
    border-bottom: 1px solid var(--forest);
    padding-bottom: 2px;
    transition: opacity 0.2s ease;
  }

  .section-head .see-all:hover { opacity: 0.6; }

  /* ===== INSPIRATION GRID ===== */
  .inspiration {
    padding: 90px 32px 100px;
    border-top: 1px solid var(--tan);
  }

  .insp-grid {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 26px;
  }

  .insp-grid .secondary-col {
    display: grid;
    gap: 26px;
  }

  .article-card {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--tan);
    background: white;
    display: flex;
    flex-direction: column;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }

  .article-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 14px 28px -12px rgba(31,42,36,0.18);
  }

  .article-card.featured { min-height: 100%; }

  .card-image {
    aspect-ratio: 4/3;
    background: linear-gradient(135deg, var(--forest), var(--ink));
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    padding: 18px;
  }

  .article-card.featured .card-image { aspect-ratio: 16/10; }

  .card-image .place-mono {
    font-family: 'JetBrains Mono', monospace;
    color: rgba(255,255,255,0.85);
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .card-image::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.35), transparent 60%);
  }

  .card-body { padding: 22px; flex: 1; display: flex; flex-direction: column; }

  .card-body .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    color: var(--ochre);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .card-body h3 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 1.5rem;
    margin-bottom: 10px;
    line-height: 1.2;
  }

  .article-card.featured .card-body h3 { font-size: 1.9rem; }

  .card-body p {
    color: var(--ink-soft);
    font-size: 0.94rem;
    flex: 1;
  }

  .card-meta {
    display: flex;
    gap: 16px;
    margin-top: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    color: var(--fade);
  }

  /* gradients standing in for photography, each distinct */
  .grad-1 { background: linear-gradient(135deg, #3F5443, #2A1815); }
  .grad-2 { background: linear-gradient(135deg, #7A2E2A, #3C1F1E); }
  .grad-3 { background: linear-gradient(135deg, #A48F6E, #3C1F1E); }

  /* ===== BREW & BUGS ===== */
  .brew-bugs {
    padding: 90px 32px 110px;
    background: var(--ink);
    color: var(--paper);
    position: relative;
  }

  .brew-bugs .wrap { position: relative; }

  .bb-head {
    text-align: center;
    margin-bottom: 56px;
  }

  .bb-head .section-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--tan);
  }

  .bb-head h2 {
    font-family: 'Fraunces', serif;
    font-size: 2.1rem;
    font-weight: 500;
    margin-top: 12px;
    color: var(--paper);
  }

  .bb-head p {
    max-width: 480px;
    margin: 14px auto 0;
    color: #D9C9AE;
    font-size: 0.98rem;
  }

  .bb-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 28px;
  }

  .bb-card {
    background: rgba(250,246,238,0.04);
    border: 1px solid rgba(217,203,168,0.25);
    border-radius: 6px;
    padding: 36px;
  }

  .bb-card h3 {
    font-family: 'Fraunces', serif;
    font-size: 1.3rem;
    font-weight: 500;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bb-card .bb-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--tan);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 20px;
    display: block;
  }

  .bb-card p { color: #D9C9AE; font-size: 0.92rem; margin-bottom: 22px; }

  .coffee-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--ochre);
    color: white;
    padding: 12px 22px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.92rem;
    transition: background 0.2s ease;
  }

  .coffee-btn:hover { background: #5C201D; }

  .bug-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .bug-form select, .bug-form textarea {
    background: rgba(250,246,238,0.06);
    border: 1px solid rgba(217,203,168,0.3);
    border-radius: 4px;
    color: var(--paper);
    padding: 12px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.9rem;
    resize: vertical;
  }

  .bug-form textarea { min-height: 80px; }

  .bug-form button {
    background: var(--forest);
    color: white;
    border: none;
    padding: 12px 20px;
    border-radius: 4px;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    align-self: flex-start;
    transition: background 0.2s ease;
  }

  .bug-form button:hover { background: #2C3E2F; }

  @media (max-width: 880px) {
    .insp-grid { grid-template-columns: 1fr; }
    .bb-grid { grid-template-columns: 1fr; }
    .search-postcard-inner { flex-wrap: wrap; }
    .search-btn { width: 100%; }
  }
</style>
</head>
<body>

<div id="global-navbar"></div>
<script src="navbar.js" defer></script>

<section class="hero" style="padding: 72px 32px 56px;">
  <div class="hero-eyebrow">The person behind Globehint</div>
  <h1>About Globehint</h1>
  <p class="lede" style="max-width:640px;">[This page is a work in progress. Focus is currently on guides and then you can learn more!]</p>
</section>

<div id="global-footer"></div>

</body>
</html>
